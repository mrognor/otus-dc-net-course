node_name = "leaf3"
node_type = "frr"

[links.eth1]
neigh = "spine1"
iface = "eth3"

[links.eth2]
neigh = "spine2"
iface = "eth3"

[links.eth3]
neigh = "t2"
iface = "eth1"

[linux]
net = """
ip route del default
sysctl -w net.ipv6.conf.all.disable_ipv6=1

# Loopbacks
ip link add dev loopback0 type dummy
ip address add 10.0.0.3/32 dev loopback0
ip link set dev loopback0 up

# Bridge
ip link add br0 type bridge vlan_filtering 1 vlan_default_pvid 0
ip link add vxlan0 type vxlan dstport 4789 local 10.0.0.3 nolearning external vnifilter
ip link set vxlan0 master br0
ip link set br0 up
ip link set vxlan0 up
bridge link set dev vxlan0 vlan_tunnel on

# l2vni 110 - vlan 10
bridge vlan add dev br0 vid 10 self
bridge vlan add dev vxlan0 vid 10
bridge vni add dev vxlan0 vni 110
bridge vlan add dev vxlan0 vid 10 tunnel_info id 110
ip link add vlan10 link br0 type vlan id 10
ip link set vlan10 up
ip link add link vlan10 dev sagvlan10 type macvlan
ip link set dev sagvlan10 address 00:00:00:01:01:01
ip addr add 192.168.10.253/24 dev sagvlan10
ip link set sagvlan10 up

# l2vni 120 - vlan 20
bridge vlan add dev br0 vid 20 self
bridge vlan add dev vxlan0 vid 20
bridge vni add dev vxlan0 vni 120
bridge vlan add dev vxlan0 vid 20 tunnel_info id 120
ip link add vlan20 link br0 type vlan id 20
ip link set vlan20 up
ip link add link vlan10 dev sagvlan20 type macvlan
ip link set dev sagvlan20 address 00:00:00:01:01:01
ip addr add 192.168.20.253/24 dev sagvlan20
ip link set sagvlan20 up

# P2p links to leafs
ip address add 10.2.1.5/31 dev eth1
ip address add 10.2.2.5/31 dev eth2

# Bond to client
ip link add dev bond0 type bond mode 802.3ad
ip link set dev bond0 address 00:00:00:00:02:01
ip link set dev bond0 up
ip link set dev bond0 master br0
bridge vlan add vid 20 dev bond0 pvid 20 egress untagged

ip link set dev eth3 down
ip link set dev eth3 master bond0
ip link set dev eth3 up
"""

[frr]
daemons = ["bgpd", "bfdd"]

net = """
evpn mh redirect-off
!
route-map ALLOW permit 1
!
route-map RM_L0 permit 2
 match interface loopback0
!
route-map RM_AS_RANGE permit 3
 match as-path PF_AS_RANGE
exit
!
interface bond0
 evpn mh es-id 00:22:22:22:22:22:22:22:22:22
exit
!
router bgp 65003
 bgp router-id 10.0.0.3
 neighbor SPINES peer-group
 neighbor SPINES remote-as 65000
 neighbor SPINES bfd
 neighbor SPINES password ebgp
 neighbor SPINES timers 1 3
 neighbor 10.2.1.4 peer-group SPINES
 neighbor 10.2.2.4 peer-group SPINES
 !
 address-family ipv4 unicast
  network 10.0.0.3/32
  redistribute connected route-map RM_L0
  neighbor SPINES route-map RM_AS_RANGE in
  neighbor SPINES route-map ALLOW out
  maximum-paths 4
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor SPINES activate
  neighbor SPINES route-map RM_AS_RANGE in
  neighbor SPINES route-map ALLOW out
  advertise-all-vni
  advertise-default-gw
 exit-address-family
exit
!
bgp as-path access-list PF_AS_RANGE seq 5 permit 65000
!
end
"""
