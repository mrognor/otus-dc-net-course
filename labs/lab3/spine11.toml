node_name = "spine11"
node_type = "frr"

[links.eth1]
neigh = "leaf11"
iface = "eth1"

[links.eth2]
neigh = "leaf12"
iface = "eth1"

[links.eth3]
neigh = "leaf13"
iface = "eth1"

[links.eth4]
neigh = "super-spine2"
iface = "eth2"

[linux]
net = """
# Loopbacks
ip link add dev loopback0 type dummy
ip address add 10.0.11.0/32 dev loopback0

# P2p link to super-spine2
ip address add 20.2.0.5/31 dev eth4

# P2p links to leafs
ip address add 10.2.11.0/31 dev eth1
ip address add 10.2.11.2/31 dev eth2
ip address add 10.2.11.4/31 dev eth3
"""

[frr]
daemons = ["bfdd", "isisd"]

net = """
interface eth1
 ip router isis UNDERLAY
 isis bfd
 isis circuit-type level-1
 isis network point-to-point
exit
!
interface eth2
 ip router isis UNDERLAY
 isis bfd
 isis circuit-type level-1
 isis network point-to-point
exit
!
interface eth3
 ip router isis UNDERLAY
 isis bfd
 isis circuit-type level-1
 isis network point-to-point
exit
!
interface eth4
 ip router isis UNDERLAY
 isis bfd
 isis circuit-type level-2-only
 isis network point-to-point
exit
!
interface loopback0
 ip router isis UNDERLAY
exit
!
router isis UNDERLAY
 is-type level-1-2
 net 49.0002.0100.0001.1000.00
 domain-password md5 ABCDEFGHIJK
exit
!
bfd
 peer 10.0.11.0
 exit
 !
exit
!
end
"""
