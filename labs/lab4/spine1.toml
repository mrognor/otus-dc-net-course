node_name = "spine1"
node_type = "frr"

[links.eth1]
neigh = "leaf1"
iface = "eth1"

[links.eth2]
neigh = "leaf2"
iface = "eth1"

[links.eth3]
neigh = "leaf3"
iface = "eth1"

[linux]
net = """
# Loopbacks
ip link add dev loopback0 type dummy
ip address add 10.0.1.0/32 dev loopback0

# P2p links to leafs
ip address add 10.2.1.0/31 dev eth1
ip address add 10.2.1.2/31 dev eth2
ip address add 10.2.1.4/31 dev eth3
"""

[frr]
daemons = ["bgpd"]

net = """
router bgp 65000
 bgp router-id 10.0.1.0
 neighbor 10.2.1.1 remote-as internal
 neighbor 10.2.1.3 remote-as internal
 neighbor 10.2.1.5 remote-as internal
 !
 address-family ipv4 unicast
  network 10.0.1.0/32
  redistribute connected
  neighbor 10.2.1.1 route-reflector-client
  neighbor 10.2.1.3 route-reflector-client
  neighbor 10.2.1.5 route-reflector-client
  maximum-paths ibgp 4
 exit-address-family
exit
!
end
"""
